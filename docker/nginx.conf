server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static multipage build (/, /config). Resolve clean URLs to their prerendered
    # .html, fall back to the prerendered 404 page.
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }
    error_page 404 /404.html;

    # Fingerprinted Nuxt assets never change — cache them hard.
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
