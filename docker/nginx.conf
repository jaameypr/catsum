server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets: return a real 404 if missing — never the HTML fallback below.
    # A JS/CSS file served as an HTML 404 page breaks the app ("Unexpected token
    # '<'"). Fingerprinted, so cache hard.
    location ~* \.(js|mjs|css|json|map|svg|png|ico|woff2?)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static multipage build (/, /config). Resolve clean URLs to their prerendered
    # .html, fall back to the prerendered 404 page.
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }
    error_page 404 /404.html;
}
